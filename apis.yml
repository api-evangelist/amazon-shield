modified: '2026-03-16'
apis:
  - name: AWS Shield API
    description: >-
      The AWS Shield API provides programmatic access to manage DDoS protection
      for your AWS resources. It enables developers to create and manage
      protections, subscribe to Shield Advanced, configure emergency contacts,
      view attack details and statistics, and manage protection groups for
      coordinated defense across multiple resources.
