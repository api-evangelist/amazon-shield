name: Amazon Shield
description: AWS Shield is a managed Distributed Denial of Service (DDoS) protection service that safeguards applications running on AWS. It provides always-on detection and automatic inline 
  mitigations that minimize application downtime and latency, with two tiers of protection - Shield Standard for automatic defense against common attacks and Shield Advanced for enhanced detection and
  24/7 access to the DDoS Response Team.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
