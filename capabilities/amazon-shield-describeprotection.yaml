naftiko: 1.0.0-alpha2
info:
  label: 'Amazon Shield REST API — #DescribeProtection'
  description: 'Amazon Shield REST API — #DescribeProtection. 1 operations. Lead operation: Amazon Shield Describe Protection.
    Self-contained Naftiko capability covering one Amazon Shield business surface.'
  tags:
  - Amazon Shield
  - '#DescribeProtection'
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_SHIELD_API_KEY: AMAZON_SHIELD_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-shield-describeprotection
    baseUri: https://shield.us-east-1.amazonaws.com
    description: 'Amazon Shield REST API — #DescribeProtection business capability. Self-contained, no shared references.'
    resources:
    - name: '#DescribeProtection'
      path: /#DescribeProtection
      operations:
      - name: describeprotection
        method: POST
        description: Amazon Shield Describe Protection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_SHIELD_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-shield-describeprotection-rest
    port: 8080
    description: 'REST adapter for Amazon Shield REST API — #DescribeProtection. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.'
    resources:
    - path: /v1/describeprotection
      name: describeprotection
      description: 'REST surface for #DescribeProtection.'
      operations:
      - method: POST
        name: describeprotection
        description: Amazon Shield Describe Protection
        call: amazon-shield-describeprotection.describeprotection
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-shield-describeprotection-mcp
    port: 9090
    transport: http
    description: 'MCP adapter for Amazon Shield REST API — #DescribeProtection. One tool per consumed operation, routed inline
      through this capability''s consumes block.'
    tools:
    - name: amazon-shield-describe-protection
      description: Amazon Shield Describe Protection
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-shield-describeprotection.describeprotection
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
